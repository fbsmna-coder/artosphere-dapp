services:
  artosphere-dapp:
    build: .
    container_name: artosphere-dapp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3200:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
